<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SIMPLE INTEREST CALCULATOR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Welcome to Simple Interest calculator 💰💸</h1>
  <div id="main">

    <div>
    <label for="amount">Enter Amount :</label>
    <input type="number" id="amount" min="0">
    </div>
    <div>
    <label for="rupees">Enter Rate  % or in RS :</label>
    <select name="Interest" id="Interest">
      <option value="RS">RS</option>
      <OPtion value="%">%</OPtion>
    </select>
    <input type="number" id="rupees" min="0" placeholder="Ex: 1.5RS or 18% ">
    </div>
    <div>
      <label for="est_date">Select Date : </label>
      <select name="est_date" id="est_date">Actual
         <option value="Estimate">Estimate Date</option>
        <option value="Actual">Actual Date</option>
      </select>
      </div>
      <div id="est" style="display: none;">
        <label for="t">Years</label>
        <input type="number" id="t">
        <label for="u">Months</label>
        <input type="number" id="u">
        <label for="v">Days</label>
        <input type="number" id="v">
      </div>
      <div id="actual" style="display: none;">
      <div>
      <label for="given_date">Given Date :</label>
      <input type="date" name="given_date" id="given_date">
    </div>
    <div>
      <label for="to_date">To Date :</label>
      <input type="date" name="to_date" id="to_date">
    </div>
    </div>
    <div>
      <button id="submit" onclick="Submit()">Submit</button>
    </div>
  </div>

  <div id="result">
      <p id="x">Given Amount : </p>
      <p id="c">Interest : </p>
      <p id="y">Given Date : </p>
      <p id="z">To Date : </p>
      <p id="d">Total Days : </p>
      <p id="a">Interest : </p>
      <p id="b">Total Amount : </p>
      <button id="close" onclick="Close()">Close</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
